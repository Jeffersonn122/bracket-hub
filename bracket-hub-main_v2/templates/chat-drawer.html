<div id="drawerChat" class="chat-drawer d-none">

        <div id="drawerChatTitle"></div>
        <button class="btn btn-sm btn-outline-light" onclick="fecharChatMatch()">✕</button>
    </div>
    <div id="drawerChatBody" class="chat-drawer-body"></div>

        <input id="drawerChatInput" type="text" placeholder="Escreva no chat do slot...">
        <button onclick="enviarMensagemPartida(chatAtivoMatchId)">Enviar</button>
    </div>
</div>
