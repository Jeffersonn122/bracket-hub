<!-- templates/admin_edit.html - Editar torneio sem emojis -->

<h5 class="fw-bold text-white mb-3">Editar Informacoes do Torneio</h5>
<form id="formEditarTorneio" action="/editar_torneio/{{ torneio_ativo_idx or 0 }}" method="POST" class="row g-3">
    <input type="hidden" name="torneio_idx" value="{{ torneio_ativo_idx or 0 }}">
    <div class="col-md-6">
        <label class="small text-secondary fw-bold">Nome do Torneio</label>
        <input type="text" name="nome" id="editNomeTorneio" class="form-control form-control-custom" value="{{ safe_get(torneio, 'nome', '') }}" required>
    </div>
    <div class="col-md-6">
        <label class="small text-secondary fw-bold">Jogo</label>
        <select name="jogo_idx" id="editJogoTorneio" class="form-select form-control-custom" required>
            {% for jogo in jogos %}
                {% set jogo_atual = safe_get(torneio, 'jogo', None) %}
                {% set nome_jogo_atual = safe_get(jogo_atual, 'nome', '') %}
                <option value="{{ loop.index0 }}" {% if jogo.obter_nome() == nome_jogo_atual %}selected{% endif %}>
                    {{ jogo.obter_nome() }} - {{ jogo.obter_categoria() }}
                </option>
            {% endfor %}
        </select>
        <small class="text-muted">{{ jogos|length }} jogos disponiveis</small>
    </div>
    <div class="col-md-6">
        <label class="small text-secondary fw-bold">Codigo de Entrada</label>
        <input type="text" name="codigo_convite" id="editCodigoTorneio" class="form-control form-control-custom" value="{{ safe_get(torneio, 'codigo_convite', '') }}">
    </div>
    <div class="col-md-6">
        <label class="small text-secondary fw-bold">Limite de Vagas</label>
        <input type="number" name="limite_vagas" id="editLimiteVagas" class="form-control form-control-custom" value="{{ safe_get(torneio, 'limite_vagas', 8) }}">
    </div>
    <div class="col-md-6">
        <label class="small text-secondary fw-bold">Plataforma</label>
        <select name="plataforma" id="editPlataforma" class="form-select form-control-custom">
            <option value="PC" {% if safe_get(torneio, 'plataforma', '') == 'PC' %}selected{% endif %}>PC</option>
            <option value="PS5" {% if safe_get(torneio, 'plataforma', '') == 'PS5' %}selected{% endif %}>PS5</option>
            <option value="Xbox Series X" {% if safe_get(torneio, 'plataforma', '') == 'Xbox Series X' %}selected{% endif %}>Xbox Series X</option>
            <option value="Switch" {% if safe_get(torneio, 'plataforma', '') == 'Switch' %}selected{% endif %}>Nintendo Switch</option>
            <option value="Multiplataforma" {% if safe_get(torneio, 'plataforma', '') == 'Multiplataforma' %}selected{% endif %}>Multiplataforma</option>
            <option value="Mobile" {% if safe_get(torneio, 'plataforma', '') == 'Mobile' %}selected{% endif %}>Mobile</option>
        </select>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-sm btn-accent px-4 py-2">Salvar Alteracoes</button>
    </div>
</form>
