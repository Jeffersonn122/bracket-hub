<!-- templates/admin_players.html - Competidores sem emojis -->

<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-bold text-white m-0">Lista de Competidores Homologados</h5>
    <div>
        <button class="btn btn-sm btn-outline-secondary me-2" onclick="exportarParticipantesCSV()">Exportar CSV</button>
        <button class="btn btn-sm btn-accent" onclick="gerarChaveamentoDuplo()">Gerar Chaveamento (Seed)</button>
    </div>
</div>
<div class="p-3 bg-dark border border-secondary rounded">
    <h6 class="small fw-bold mb-3 text-info">Participantes (<span id="lblQtdInscritos">0</span>)</h6>
    <div class="mb-3">
        <label class="small text-secondary fw-bold">Adicionar jogadores em massa</label>
        <textarea id="inputJogadoresEmMassa" class="form-control form-control-custom mt-2" rows="5" placeholder="Digite varios nomes, um por linha ou separados por virgula, ponto e virgula ou barra vertical." style="color: #f3f4f6 !important; background-color: #111827 !important; min-height: 140px;"></textarea>
        <button type="button" class="btn btn-sm btn-accent mt-2" onclick="adicionarJogadoresEmMassa()">Adicionar jogadores</button>
        <small class="text-muted d-block mt-1">Os nomes serao inseridos com seed aleatoria no painel atual.</small>
    </div>
    <div id="containerListaInscritos" class="d-flex flex-column gap-1"></div>
</div>

<div class="mt-3 p-3 bg-dark border border-secondary rounded">
    <h6 class="small fw-bold text-warning mb-3">Formulario de Inscricao Manual</h6>
    <div class="row g-3">
        <div class="col-md-5">
            <label class="small text-secondary fw-bold">Nickname / GamerTag</label>
            <input type="text" id="inscreverNick" class="form-control form-control-custom form-control-sm mt-1" placeholder="Ex: ShadowFighter">
        </div>
        <div class="col-md-4">
            <label class="small text-secondary fw-bold">Personagem (opcional)</label>
            <input type="text" id="inscreverPersonagem" class="form-control form-control-custom form-control-sm mt-1" placeholder="Ryu, Ken, etc">
        </div>
        <div class="col-md-3 d-flex align-items-end">
            <button type="button" class="btn btn-accent btn-accent-sm w-100" onclick="adicionarJogadorManual()">
                Adicionar
            </button>
        </div>
    </div>
</div>
