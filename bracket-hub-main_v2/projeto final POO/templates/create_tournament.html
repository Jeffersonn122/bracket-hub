<!-- templates/create_tournament.html - Criar torneio sem emojis -->

<div class="card-custom">
    <h5 class="fw-bold text-warning mb-3">Publicar Novo Torneio</h5>
    <form action="/criar_torneio" method="POST" class="row g-3">
        <div class="col-md-6">
            <label class="small text-secondary fw-bold">Nome do Torneio</label>
            <input type="text" name="torneio_nome" class="form-control form-control-custom" placeholder="Ex: Campeonato Ultimate" required>
        </div>
        <div class="col-md-6">
            <label class="small text-secondary fw-bold">Jogo</label>
            <select name="jogo_idx" class="form-select form-control-custom" required>
                {% for jogo in jogos %}
                    <option value="{{ loop.index0 }}" {% if loop.index0 == 0 %}selected{% endif %}>
                        {{ jogo.obter_nome() }} - {{ jogo.obter_categoria() }}
                    </option>
                {% endfor %}
            </select>
            <small class="text-muted">{{ jogos|length }} jogos disponíveis</small>
        </div>
        <div class="col-md-6">
            <label class="small text-secondary fw-bold">Codigo de Entrada</label>
            <input type="text" name="codigo_convite" class="form-control form-control-custom" placeholder="Ex: GG-PRO-2026" value="GG-PRO">
        </div>
        <div class="col-md-6">
            <label class="small text-secondary fw-bold">Limite de Vagas</label>
            <input type="number" name="limite_vagas" class="form-control form-control-custom" value="8" min="2" max="16">
            <small class="text-muted">Use 2, 4, 8 ou 16 jogadores</small>
        </div>
        <div class="col-md-6">
            <label class="small text-secondary fw-bold">Plataforma</label>
            <select name="plataforma" class="form-select form-control-custom">
                <option value="PC">PC</option>
                <option value="PS5">PS5</option>
                <option value="Xbox Series X">Xbox Series X</option>
                <option value="Switch">Nintendo Switch</option>
                <option value="Multiplataforma">Multiplataforma</option>
                <option value="Mobile">Mobile</option>
            </select>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-sm btn-accent px-4 py-2">Publicar torneio</button>
        </div>
    </form>
</div>
