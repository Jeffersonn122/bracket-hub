<!-- templates/index.html - Container principal corrigido -->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRACKET.HUB - Tournament Management Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="wrapper">
    <!-- Sidebar -->
    <div class="sgg-sidebar">
        <div class="sidebar-top">
            <div class="sidebar-brand" onclick="switchTab('tab-home')">BRACKET.HUB</div>
            <div class="sidebar-menu">
                <button class="sidebar-link active" id="sidebar-home" onclick="switchTab('tab-home')">Torneios Ativos</button>
                <button class="sidebar-link" id="sidebar-shop" onclick="window.location.href='/loja'">Loja de Evento</button>
                <button class="sidebar-link" id="sidebar-createtournament" onclick="switchTab('tab-createtournament')">Criar Torneio</button>
                <button class="sidebar-link d-none" id="sidebar-admin" onclick="switchTab('tab-admin')">Painel do Torneio</button>
            </div>
        </div>
        <div class="sidebar-footer">
            <button class="sidebar-link py-1 px-2" id="sidebar-support" onclick="switchTab('tab-support')" style="font-size: 0.85rem;">
                Suporte e FAQ
            </button>
            <select class="lang-select">
                <option value="pt-BR" selected>Português (BR)</option>
                <option value="en-US">English (US)</option>
            </select>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Topbar -->
        <div class="sgg-topbar">
            <input type="text" id="sggSearchInput" class="search-input" placeholder="Buscar torneios..." onkeyup="filtrarEventos()">
            
            <div class="d-flex align-items-center gap-3">
                <!-- REMOVIDO: botão da loja no topbar -->
                {% if usuario %}
                    <div class="avatar-box-btn" onclick="window.location.href='/perfil'" style="cursor: pointer;">
                        <span class="text-white small fw-bold">{{ usuario.nick }}</span>
                    </div>
                    <button onclick="window.location.href='/logout'" class="btn btn-sm btn-outline-danger" title="Sair">
                        Sair
                    </button>
                {% else %}
                    <div class="avatar-box-btn" onclick="abrirModalLogin()">
                        <span class="text-warning small fw-bold">Entrar / Cadastrar</span>
                    </div>
                {% endif %}
            </div>
        </div>

        <!-- Content -->
        <div class="container-fluid p-4">
            <!-- Tab: Home -->
            <div class="tab-content-item" id="tab-home">
                {% include 'home.html' %}
            </div>

            <!-- Tab: Criar Torneio -->
            <div class="tab-content-item d-none" id="tab-createtournament">
                {% include 'create_tournament.html' %}
            </div>

            <!-- Tab: Admin -->
            <div class="tab-content-item d-none" id="tab-admin">
                {% include 'admin_panel.html' %}
            </div>

            <!-- Tab: Suporte -->
            <div class="tab-content-item d-none" id="tab-support">
                {% include 'support.html' %}
            </div>
        </div>
    </div>
</div>

<!-- Container para notificações toast -->
<div id="toastContainer" class="toast-container-custom"></div>

<!-- Componentes -->
{% include 'chat-drawer.html' %}

<!-- Modais -->
{% include 'modals.html' %}

<!-- Scripts -->
<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
<script src="{{ url_for('static', filename='js/bracket.js') }}"></script>
<script src="{{ url_for('static', filename='js/participantes.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
